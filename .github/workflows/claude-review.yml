name: AI Code Review (Claude)

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    name: Generate Claude code review
    runs-on: ubuntu-latest
    if: github.event.issue.pull_request && contains(github.event.comment.body, 'claude-review')
    steps:
      - name: Add rocket reaction to comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch PR information
        id: pr_info
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            return {
              base: pr.data.base.ref,
              head: pr.data.head.ref,
              title: pr.data.title,
              description: pr.data.body || 'No description provided',
              author: pr.data.user.login
            };

      - name: Checkout PR branch and generate diff file
        run: |
          git fetch origin ${{ fromJSON(steps.pr_info.outputs.result).head }}
          git checkout ${{ fromJSON(steps.pr_info.outputs.result).head }}
          git fetch origin ${{ fromJSON(steps.pr_info.outputs.result).base }}
          git diff origin/${{ fromJSON(steps.pr_info.outputs.result).base }}...HEAD > /tmp/pr_diff.txt

      - name: Run AI code review with Claude
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          script: |
            const fs = require('fs');

            const prDetails = ${{ steps.pr_info.outputs.result }};

            let diff = '';
            try {
              diff = fs.readFileSync('/tmp/pr_diff.txt', 'utf8');
            } catch (e) {
              diff = 'Unable to read diff file';
            }

            const maxDiffLength = 15000;
            const truncatedDiff = diff.length > maxDiffLength
              ? diff.substring(0, maxDiffLength) + '\n\n... (diff truncated due to length)'
              : diff;

            const prompt = `You are an expert code reviewer. Review this pull request and provide constructive feedback.

            PR Title: ${prDetails.title}
            PR Description: ${prDetails.description}
            PR Author: ${prDetails.author}

            Code Changes:
            \`\`\`diff
            ${truncatedDiff}
            \`\`\`

            Please provide:
            1. A brief summary of the changes
            2. Potential issues or bugs
            3. Code quality and best practices feedback
            4. Security concerns (if any)
            5. Suggestions for improvement

            Keep your review concise and actionable.`;

            const body = JSON.stringify({
              model: 'claude-sonnet-4-6',
              max_tokens: 8192,
              messages: [{ role: 'user', content: prompt }]
            });

            console.log('Request body size:', body.length, 'chars,', Buffer.byteLength(body, 'utf8'), 'bytes');

            const response = await fetch('https://api.anthropic.com/v1/messages', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'x-api-key': process.env.ANTHROPIC_API_KEY,
                'anthropic-version': '2023-06-01'
              },
              body: body
            });

            const responseText = await response.text();

            if (!response.ok) {
              throw new Error(`API request failed with status ${response.status} - ${responseText}`);
            }

            const result = JSON.parse(responseText);
            const review = result.content[0].text;

            const commentBody = '## 🤖 Claude Code Review\n\n' + review;

            try {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
              console.log('✅ Claude review posted successfully');
            } catch (error) {
              console.error('❌ Error during Claude review:', error.message);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: '## 🤖 Claude Code Review\n\n⚠️ Unable to generate automated review: ' + error.message
              });
            }
