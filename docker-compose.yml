services:
  postgres:
    image: postgres:17-alpine
    container_name: medease-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: medease
      POSTGRES_USER: medease_user
      POSTGRES_PASSWORD: medease_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medease_user -d medease"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: medease-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: medease-adminer
    restart: unless-stopped
    ports:
      - "5051:8080"
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medease-backend
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      NODE_ENV: development
      PORT: 5001
      DATABASE_URL: postgresql://medease_user:medease_dev_password@postgres:5432/medease
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-medease-dev-jwt-secret-do-not-use-in-production}
      JWT_EXPIRES_IN: 24h
      CORS_ORIGIN: http://localhost:3000
      CLOUDFLARE_SECRET_KEY: ${CLOUDFLARE_SECRET_KEY:-1x0000000000000000000000000000000AA}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-eu-north-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      LOG_LEVEL: debug
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      OTP_TTL_SECONDS: ${OTP_TTL_SECONDS:-600}
      OTP_MAX_ATTEMPTS: ${OTP_MAX_ATTEMPTS:-3}
    volumes:
      - ./backend/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medease-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:5001
      VITE_CLOUDFLARE_SITE_KEY: ${VITE_CLOUDFLARE_SITE_KEY:-1x00000000000000000000AA}
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
    depends_on:
      - backend

  db-seed:
    image: postgres:17-alpine
    container_name: medease-db-seed
    profiles:
      - seed
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./database/seed.sql:/seed.sql:ro
    entrypoint: >
      sh -c "echo 'Seeding database...' &&
             PGPASSWORD=medease_dev_password psql -h postgres -U medease_user -d medease -f /seed.sql &&
             echo 'Database seeded successfully.'"
    restart: "no"

  lab-report-seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medease-lab-report-seed
    profiles:
      - seed
    depends_on:
      - db-seed
      - backend
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://medease_user:medease_dev_password@postgres:5432/medease
    env_file:
      - ./backend/.env.development
    entrypoint: >
      sh -c "echo 'Seeding lab report PDF files...' &&
             node scripts/seedLabReportFiles.js &&
             echo 'Lab report files seeded successfully.'"
    restart: "no"

volumes:
  postgres_data:
  redis_data:
